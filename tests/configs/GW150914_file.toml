seed = 0

[data]
type = "file"
ifos = ["H1", "L1"]
trigger_time = 1126259462.4

[data.strain_files]
H1 = "tests/fixtures/GW150914_strain_H1.npz"
L1 = "tests/fixtures/GW150914_strain_L1.npz"

[data.psd_files]
H1 = "tests/fixtures/GW150914_psd_H1.npz"
L1 = "tests/fixtures/GW150914_psd_L1.npz"

[waveform]
approximant = "IMRPhenomXAS"
f_ref = 20.0

[prior]
M_c     = { type = "uniform",   min = 10.0,  max = 80.0  }
q       = { type = "uniform",   min = 0.125, max = 1.0   }
s1_z    = { type = "uniform",   min = -0.99, max = 0.99  }
s2_z    = { type = "uniform",   min = -0.99, max = 0.99  }
iota    = { type = "sine" }
d_L     = { type = "power_law", min = 1.0,   max = 2000.0, alpha = 2.0 }
t_c     = { type = "uniform",   min = -0.1,  max = 0.1   }
phase_c = { type = "uniform",   min = 0.0,   max = 6.283185307179586 }
psi     = { type = "uniform",   min = 0.0,   max = 3.141592653589793 }
ra      = { type = "uniform",   min = 0.0,   max = 6.283185307179586 }
dec     = { type = "cosine" }

[likelihood]
f_min = 20.0
f_max = 1024.0

[sampler]
type = "flowmc"
n_chains = 10
n_local_steps = 5
n_global_steps = 5
n_training_loops = 2
n_production_loops = 1

[output]
dir = "/tmp/jim_test_output"
overwrite = true
